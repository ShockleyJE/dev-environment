- name: Compute NVIDIA CUDA repo distro suffix from host
  set_fact:
    cuda_repo_distro: "ubuntu{{ ansible_facts.distribution_version | replace('.', '') }}"
  when: ansible_facts.distribution == "Ubuntu"
  tags:
    - install
    - cuda

- name: Download NVIDIA CUDA keyring package
  get_url:
    url: "https://developer.download.nvidia.com/compute/cuda/repos/{{ cuda_repo_distro }}/x86_64/cuda-keyring_1.1-1_all.deb"
    dest: /tmp/cuda-keyring_1.1-1_all.deb
    mode: '0644'
  become: true
  when: ansible_facts.distribution == "Ubuntu"
  tags:
    - install
    - cuda

- name: Install NVIDIA CUDA keyring package
  apt:
    deb: /tmp/cuda-keyring_1.1-1_all.deb
    state: present
  become: true
  when: ansible_facts.distribution == "Ubuntu"
  tags:
    - install
    - cuda

# M1 NVIDIA hardening (project: dev-env-nvidia-hardening, milestone 1):
# The cuda-keyring deb installs /etc/apt/preferences.d/cuda-repository-pin-600
# with `Package: *` priority 600, which makes every NVIDIA-repo nvidia-* and
# cuda-drivers* package the candidate for installed Ubuntu-archive equivalents.
# This caused `apt upgrade` to attempt cross-source / cross-branch driver
# transitions and loop on the nvidia-kernel-common virtual conflict.
# This task negates NVIDIA's repo as a candidate source for the host driver
# universe (specific packages override the wildcard pin per apt_preferences(5)),
# leaving Ubuntu's archive (priority 500) as the only source for those packages.
# cuda-toolkit-* and other userland CUDA packages remain at priority 600 from
# NVIDIA's repo, so the toolkit install path is unaffected.
- name: Scope NVIDIA CUDA repo pin to exclude host driver universe (M1 hardening)
  copy:
    dest: /etc/apt/preferences.d/cuda-driver-from-ubuntu-archive
    content: |
      # Managed by dev-environment Ansible playbook (M1 NVIDIA hardening).
      # See repos/obsidian/Project - Dev-Environment NVIDIA Install Hardening.md
      Package: nvidia-driver-* nvidia-kernel-common-* nvidia-kernel-source-* nvidia-dkms-* nvidia-utils-* nvidia-firmware-* nvidia-compute-utils-* libnvidia-* xserver-xorg-video-nvidia-* cuda-drivers cuda-drivers-*
      Pin: origin developer.download.nvidia.com
      Pin-Priority: 100
    mode: '0644'
    owner: root
    group: root
  become: true
  when: ansible_facts.distribution == "Ubuntu"
  tags:
    - install
    - cuda

- name: Add NVIDIA CUDA repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/cuda-archive-keyring.gpg] https://developer.download.nvidia.com/compute/cuda/repos/{{ cuda_repo_distro }}/x86_64/ /"
    state: present
    filename: cuda
  become: true
  when: ansible_facts.distribution == "Ubuntu"
  tags:
    - install
    - cuda

- name: Update apt cache
  apt:
    update_cache: yes
  become: true
  when: ansible_facts.distribution == "Ubuntu"
  tags:
    - install
    - cuda

- name: Install CUDA toolkit
  apt:
    name: cuda-toolkit-12-8
    state: present
  become: true
  when: ansible_facts.distribution == "Ubuntu"
  tags:
    - install
    - cuda

# M1 NVIDIA hardening: keep the host driver universe sourced from Ubuntu's
# archive and keep the selected branch explicit in this playbook. Do not
# apt-mark hold the exact-version branch packages: Ubuntu's HWE NVIDIA module
# metapackage requires matching within-branch userland updates whenever a new
# kernel ABI lands. Holding nvidia-driver-580 or nvidia-kernel-common-580 at an
# old exact version leaves a new booted kernel without a loadable nvidia module,
# which breaks nvidia-smi and OBS/NVENC.
#
# Branch history:
# - 2026-05-06: M1 implemented at branch 570 (Ubuntu archive shipped 570 as
#   the noble-updates HWE driver at kernel 6.17.0-22).
# - 2026-05-12: Canonical's HWE-driver track transitioned the
#   linux-modules-nvidia-570-generic-hwe-24.04 meta to depend on branch-580
#   modules at kernel 6.17.0-23. Embraced branch 580 (see M1 doc 2026-05-12
#   log entry); legacy branch-570 holds released so apt autoremove can
#   reclaim them on the operator's next cleanup pass.
- name: Release legacy branch-570 holds (one-shot, 2026-05-12 branch transition)
  ansible.builtin.shell: |
    set -e
    for pkg in nvidia-driver-570 nvidia-kernel-common-570 nvidia-dkms-570; do
      if dpkg -l "$pkg" 2>/dev/null | grep -q '^hi  '; then
        apt-mark unhold "$pkg" >/dev/null
      fi
    done
  become: true
  changed_when: false
  when: ansible_facts.distribution == "Ubuntu"
  tags:
    - install
    - cuda

- name: Release stale NVIDIA branch 580 holds
  ansible.builtin.shell: |
    set -e
    released=0
    for pkg in nvidia-driver-580 nvidia-kernel-common-580 nvidia-kernel-source-580 nvidia-dkms-580; do
      if apt-mark showhold | grep -qx "$pkg"; then
        apt-mark unhold "$pkg" >/dev/null
        released=$((released + 1))
      fi
    done
    echo "released=$released"
  become: true
  changed_when: "'released=0' not in nvidia_hold_result.stdout"
  when: ansible_facts.distribution == "Ubuntu"
  register: nvidia_hold_result
  tags:
    - install
    - cuda

- name: Display NVIDIA driver hold status
  debug:
    msg: "NVIDIA driver hold: {{ nvidia_hold_result.stdout }}"
  when: ansible_facts.distribution == "Ubuntu" and nvidia_hold_result is defined
  tags:
    - install
    - cuda

- name: Ensure NVIDIA branch-580 kernel module + within-branch driver updates
  apt:
    name:
      - linux-modules-nvidia-580-generic-hwe-24.04
      - nvidia-driver-580
      - nvidia-kernel-common-580
      - nvidia-kernel-source-580
    state: latest
    install_recommends: false
  become: true
  when: ansible_facts.distribution == "Ubuntu"
  register: nvidia_kmod_result
  tags:
    - install
    - cuda

- name: Load nvidia kernel module if newly installed
  community.general.modprobe:
    name: nvidia
    state: present
  become: true
  when:
    - ansible_facts.distribution == "Ubuntu"
    - nvidia_kmod_result is changed
  tags:
    - install
    - cuda

- name: Create CUDA environment variables file
  copy:
    dest: "{{ ansible_env.HOME }}/.cuda-env"
    content: |
      # CUDA Environment Variables
      export CUDA_HOME=/usr/local/cuda-12.8
      export CUDA_PATH=$CUDA_HOME
      export PATH=$PATH:$CUDA_HOME/bin
      export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$CUDA_HOME/lib64
    mode: '0644'
  become: false
  when: ansible_facts.distribution == "Ubuntu"
  tags:
    - install
    - cuda

- name: Source CUDA environment in zsh configuration
  lineinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    line: 'source ~/.cuda-env'
    state: present
  become: false
  when: ansible_facts.distribution == "Ubuntu"
  tags:
    - install
    - cuda

- name: Verify CUDA installation
  command: /usr/local/cuda-12.8/bin/nvcc --version
  register: cuda_version
  become: false
  when: ansible_facts.distribution == "Ubuntu"
  tags:
    - install
    - cuda
  ignore_errors: true

- name: Display CUDA installation status
  debug:
    msg: "CUDA installation {{ 'completed successfully' if cuda_version.rc == 0 else 'failed or not detected' }}"
  when: ansible_facts.distribution == "Ubuntu"
  tags:
    - install
    - cuda
